<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>多元对话</title>
<style>
:root{color-scheme:light;--bg:#f8f6f3;--sb:#1a1a2e;--sbt:#e0dcd5;--sbh:#252542;--sba:#e8b86d;--txt:#2d2b28;--t2:#8c8984;--bd:#e8e5df;--bu:#edf2f7;--ba:#fff;--ac:#e8b86d}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;overflow:hidden}

#preloader{position:fixed;inset:0;z-index:9999;background:var(--sb);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s,visibility .6s}
#preloader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.pl-w{position:relative;width:100px;height:100px;margin-bottom:28px}
.pl-b{position:absolute;border-radius:50%;filter:blur(6px);opacity:.7;animation:morph 3s ease-in-out infinite}
.pl-b:nth-child(1){width:50px;height:50px;background:var(--ac);top:25px;left:8px}
.pl-b:nth-child(2){width:38px;height:38px;background:#8b5cf6;top:8px;left:38px;animation-delay:-1s}
.pl-b:nth-child(3){width:42px;height:42px;background:#60a5fa;top:38px;left:28px;animation-delay:-2s}
@keyframes morph{0%,100%{border-radius:50%;transform:translate(0,0) scale(1)}25%{border-radius:60% 40% 55% 45%;transform:translate(12px,-8px) scale(1.1)}50%{border-radius:45% 55% 50% 50%;transform:translate(-8px,4px) scale(.9)}75%{border-radius:40% 60% 45% 55%;transform:translate(4px,12px) scale(1.05)}}
.pl-t{font-size:15px;color:var(--sbt);letter-spacing:3px;animation:pul 2s ease-in-out infinite}
@keyframes pul{0%,100%{opacity:.5}50%{opacity:1}}
.pl-d{display:flex;gap:5px;margin-top:10px}
.pl-d span{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:db .8s ease-in-out infinite}
.pl-d span:nth-child(2){animation-delay:.15s}.pl-d span:nth-child(3){animation-delay:.3s}
@keyframes db{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.sidebar{width:280px;min-width:280px;background:var(--sb);color:var(--sbt);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sb-hd{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-hd h1{font-size:18px;font-weight:700}
.sb-hd p{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.sb-sec{padding:16px 12px 4px}
.sb-sec h2{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);padding:0 8px;margin-bottom:8px}
.rc{display:flex;align-items:center;gap:12px;padding:12px;margin:2px 0;border-radius:10px;cursor:pointer;transition:all .3s;border:2px solid transparent;position:relative}
.rc:hover{background:var(--sbh);transform:translateX(3px)}
.rc.active{background:rgba(232,184,109,.12);border-color:var(--sba)}
.rc.active::after{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;background:var(--ac);border-radius:0 2px 2px 0}
.rc-av{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0}
.rc-info{flex:1;min-width:0}
.rc-nm{font-size:13px;font-weight:600}
.rc-sc{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}

.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.ch-hd{padding:18px 24px;background:var(--ba);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px;flex-shrink:0}
.ch-av{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
.ch-info h2{font-size:16px;font-weight:700}
.ch-info p{font-size:12px;color:var(--t2);margin-top:2px}
.ch-act{margin-left:auto;display:flex;gap:6px;align-items:center}
.mt{display:flex;gap:0;background:#f1eee8;border-radius:8px;padding:2px;margin-right:6px}
.mb{padding:7px 14px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;color:var(--t2);transition:all .3s;white-space:nowrap}
.mb.active{background:#fff;color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn-arc{padding:7px 14px;border:1px solid var(--bd);background:#fff;border-radius:8px;cursor:pointer;font-size:11px;color:var(--t2);transition:all .3s}
.btn-arc:hover{border-color:var(--ac);color:var(--ac)}

.msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.ws{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;animation:fi .8s ease both}
@keyframes fi{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.ws-av{width:100px;height:100px;border-radius:50%;overflow:hidden;margin-bottom:18px}
.ws h2{font-size:22px;margin-bottom:8px}
.ws .sub{color:var(--t2);max-width:440px;line-height:1.6;font-size:13px}
.ws-sug{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;justify-content:center;max-width:480px}
.sug{display:inline-block;padding:9px 18px;background:#fff;border:1px solid var(--bd);border-radius:20px;cursor:pointer;font-size:12px;color:var(--txt);transition:all .3s}
.sug:hover{border-color:var(--ac);color:var(--ac);transform:translateY(-1px)}

.msg{display:flex;gap:10px;max-width:82%;animation:mi .4s ease both}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.ma{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0}
.mc{padding:12px 16px;border-radius:16px;line-height:1.6;font-size:13px}
.msg.user .mc{background:var(--bu);border-bottom-right-radius:4px}
.msg.ai .mc{background:var(--ba);border:1px solid var(--bd);border-bottom-left-radius:4px}

.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--t2);border-radius:50%;animation:tb 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{opacity:.3;transform:scale(.7)}30%{opacity:1;transform:scale(1)}}

.inp-area{padding:16px 24px 20px;background:var(--ba);border-top:1px solid var(--bd);flex-shrink:0}
.inp-w{display:flex;gap:10px;align-items:flex-end}
.inp-w textarea{flex:1;border:1.5px solid var(--bd);border-radius:10px;padding:12px 16px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:46px;max-height:120px;line-height:1.5;transition:border-color .3s;background:var(--bg)}
.inp-w textarea:focus{border-color:var(--ac)}
.btn-s{width:46px;height:46px;border:none;background:var(--ac);color:#fff;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.btn-s:hover{background:#d4a55a;transform:scale(1.05)}
.btn-s:disabled{background:#d4cfc6;cursor:not-allowed;transform:none}

.rate-btns{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .3s}
.msg.ai .mc:hover .rate-btns,.rate-btns.rated{opacity:1}
.rate-btns button{border:none;background:0;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:8px;transition:all .2s}
.rate-btns button:hover{background:var(--bu)}
.rate-btns button.up.rated{color:#27ae60}
.rate-btns button.down.rated{color:#e74c3c}
.stats-bar{background:var(--ba);border-top:1px solid var(--bd);padding:8px 24px;font-size:11px;color:var(--t2);display:none;gap:14px;align-items:center;flex-wrap:wrap}
.stats-bar.show{display:flex}
.stats-bar span{white-space:nowrap}
.inp-hint{font-size:10px;color:var(--t2);padding:6px 0 0 4px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;animation:fi .3s ease;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:18px;width:90vw;max-width:780px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{padding:22px 26px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-hd h2{font-size:17px;font-weight:700}
.modal-close{width:34px;height:34px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:18px;color:var(--t2)}
.modal-close:hover{background:#fee;color:#e53e3e}
.modal-body{flex:1;overflow-y:auto;padding:22px 26px}
.cc{background:var(--bg);border-radius:10px;padding:18px 22px;margin-bottom:14px;border:1px solid var(--bd);transition:all .3s;cursor:pointer}
.cc:hover{border-color:var(--ac)}
.cc h3{font-size:13px;font-weight:700;margin-bottom:3px;color:#c9a96e}
.cc .ct{font-size:11px;color:var(--t2);margin-bottom:8px}
.cc .cs{font-size:12px;line-height:1.6;color:var(--t2)}
.cc.expanded .cf{display:block}
.cc .cf{display:none;font-size:12px;line-height:1.7;color:var(--txt);margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#d5d0c8;border-radius:3px}
@media(max-width:768px){.sidebar{width:72px;min-width:72px}.sb-hd h1{font-size:13px;text-align:center}.sb-hd p,.sb-sec h2,.rc-sc,.rc-nm{display:none}.rc{flex-direction:column;gap:3px;padding:8px 4px}.rc-av{width:34px;height:34px}}
</style>
</head>
<body>
<div id="preloader">
<div class="pl-w"><div class="pl-b"></div><div class="pl-b"></div><div class="pl-b"></div></div>
<div class="pl-t">心灵正在苏醒</div>
<div class="pl-d"><span></span><span></span><span></span></div>
</div>

<aside class="sidebar">
<div class="sb-hd"><h1>多元对话</h1><p>选择一位专家开始对话</p></div>
<div class="sb-sec"><h2>心理学家</h2></div><div id="plist"></div>
<div class="sb-sec"><h2>跨学科视角</h2></div><div id="ilist"></div>
<div style="padding:12px;margin-top:auto;border-top:1px solid rgba(255,255,255,.06)">

<button onclick="resetAll()" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:0;color:rgba(255,255,255,.4);cursor:pointer;font-size:11px">重置对话</button>
<button onclick="TS()" style="width:100%;padding:8px;margin-top:4px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:0;color:rgba(255,255,255,.3);cursor:pointer;font-size:10px">📊 数据看板</button>

</div>
</aside>

<main class="main">
<div class="ch-hd">
<div class="ch-av" id="hav"></div>
<div class="ch-info"><h2 id="hnm">选择一位专家</h2><p id="hsc">从左侧选择角色开始对话</p></div>
<div class="ch-act">
<div class="mt" id="mt" style="display:none">
<button class="mb active" data-mode="counseling" onclick="SM('counseling')">咨询</button>
<button class="mb" data-mode="analysis" onclick="SM('analysis')">分析</button>
</div>
<button class="btn-arc" id="barc" style="display:none" onclick="OA()">案例档案</button>
</div>
</div>
<div class="msgs" id="msgs">
<div class="ws"><div class="ws-av" style="background:linear-gradient(135deg,#e8b86d20,#8b5cf620);display:flex;align-items:center;justify-content:center;font-size:44px">&#127793;</div><h2>欢迎来到多元对话空间</h2><p class="sub">四位不同流派的心理学家，一位历史学家，一位经济周期分析师。选择一位角色，开始你的探索之旅。</p></div>
</div>

<div class="stats-bar" id="stats"><span>总计消息: <b id="st-total">0</b></span><span>好评: <b id="st-up">0</b></span><span>差评: <b id="st-down">0</b></span><span>最热角色: <b id="st-top">-</b></span><button onclick="exportData()" style="border:1px solid var(--bd);background:#fff;border-radius:6px;cursor:pointer;font-size:10px;padding:2px 8px">导出数据</button></div>
<div class="inp-area" id="inpa" style="display:none">
<div class="inp-w"><textarea id="uinp" rows="1" placeholder="输入你的想法..." onkeydown="HK(event)"></textarea><button class="btn-s" id="bsend" onclick="SE()" disabled>&#10140;</button></div>
<div class="inp-hint">Enter 发送 &middot; Shift+Enter 换行</div>
</div>
</main>

<div class="modal-overlay" id="am" style="display:none" onclick="if(event.target===this)CA()">
<div class="modal"><div class="modal-hd"><h2>精神分析案例档案</h2><button class="modal-close" onclick="CA()">&times;</button></div><div class="modal-body" id="ab"></div></div>
</div>

<script>
// ── AVATAR HELPER ──
function H(svg){return svg;}
function AV(rid,sz){sz=sz||48;var s=sz,ww=s,hh=s,CX=ww/2,CY=hh*.48,FR=hh*.42;
function bg(c){return'<circle cx="'+CX+'" cy="'+CX+'" r="'+CX+'" fill="'+c+'"/>';}
function eyes(ex,ey,er,ec){var pr=er*.38,hr=pr*.45;return'<circle cx="'+(CX-ex)+'" cy="'+ey+'" r="'+er+'" fill="'+ec+'"/><circle cx="'+(CX-ex)+'" cy="'+ey+'" r="'+pr+'" fill="#111"/><circle cx="'+(CX-ex-er*.18)+'" cy="'+(ey-er*.28)+'" r="'+hr+'" fill="#fff"/><circle cx="'+(CX+ex)+'" cy="'+ey+'" r="'+er+'" fill="'+ec+'"/><circle cx="'+(CX+ex)+'" cy="'+ey+'" r="'+pr+'" fill="#111"/><circle cx="'+(CX+ex-er*.18)+'" cy="'+(ey-er*.28)+'" r="'+hr+'" fill="#fff"/>';}
function bl(x,y,r2){return'<circle cx="'+x+'" cy="'+y+'" r="'+r2+'" fill="#f0a0a0" opacity=".22"/>';}
function rgl(ex,ey,er,clr,sw){return'<circle cx="'+(CX-ex)+'" cy="'+ey+'" r="'+(er*2)+'" fill="none" stroke="'+clr+'" stroke-width="'+sw+'"/><circle cx="'+(CX+ex)+'" cy="'+ey+'" r="'+(er*2)+'" fill="none" stroke="'+clr+'" stroke-width="'+sw+'"/><line x1="'+(CX-ex+er*2)+'" y1="'+ey+'" x2="'+(CX+ex-er*2)+'" y2="'+ey+'" stroke="'+clr+'" stroke-width="'+(sw*.75)+'"/>';}
function sqgl(ex,ey,er,clr,sw){var gw=er*3.2,gh=er*2.2;return'<rect x="'+(CX-ex-gw/2)+'" y="'+(ey-gh/2)+'" width="'+gw+'" height="'+gh+'" rx="'+(er*.6)+'" fill="none" stroke="'+clr+'" stroke-width="'+sw+'"/><rect x="'+(CX+ex-gw/2)+'" y="'+(ey-gh/2)+'" width="'+gw+'" height="'+gh+'" rx="'+(er*.6)+'" fill="none" stroke="'+clr+'" stroke-width="'+sw+'"/><line x1="'+(CX-ex+gw/2)+'" y1="'+ey+'" x2="'+(CX+ex-gw/2)+'" y2="'+ey+'" stroke="'+clr+'" stroke-width="'+(sw*.7)+'"/>';}
function W(inner){return'<svg viewBox="0 0 '+ww+' '+hh+'" width="'+ww+'" height="'+hh+'">'+inner+'</svg>';}
var AA={};
AA.psychoanalytic=W(bg('#E8E2D8')+'<ellipse cx="'+(CX-FR*.82)+'" cy="'+(CY-FR*.35)+'" rx="'+(FR*.38)+'" ry="'+(FR*.5)+'" fill="#C8BFB5"/><ellipse cx="'+(CX-FR*.82)+'" cy="'+(CY-FR*.35)+'" rx="'+(FR*.2)+'" ry="'+(FR*.3)+'" fill="#F0E8DD"/><ellipse cx="'+(CX+FR*.82)+'" cy="'+(CY-FR*.35)+'" rx="'+(FR*.38)+'" ry="'+(FR*.5)+'" fill="#C8BFB5"/><ellipse cx="'+(CX+FR*.82)+'" cy="'+(CY-FR*.35)+'" rx="'+(FR*.2)+'" ry="'+(FR*.3)+'" fill="#F0E8DD"/><ellipse cx="'+CX+'" cy="'+CY+'" rx="'+(FR*1.05)+'" ry="'+(FR*.9)+'" fill="#D0C8BB"/><ellipse cx="'+CX+'" cy="'+(CY+FR*.08)+'" rx="'+(FR*.18)+'" ry="'+(FR*.13)+'" fill="#3A3028"/><ellipse cx="'+CX+'" cy="'+(CY+FR*.05)+'" rx="'+(FR*.06)+'" ry="'+(FR*.04)+'" fill="#5A5048" opacity=".4"/>'+eyes(FR*.35,CY-FR*.18,FR*.1,'#2A2018')+bl(CX-FR*.55,CY+FR*.05,FR*.12)+bl(CX+FR*.55,CY+FR*.05,FR*.12)+'<path d="M'+(CX-FR*.2)+','+(CY+FR*.3)+' Q'+CX+','+(CY+FR*.48)+' '+(CX+FR*.2)+','+(CY+FR*.3)+'" fill="none" stroke="#8A7060" stroke-width="'+(hh*.025)+'" stroke-linecap="round"/>'+rgl(FR*.35,CY-FR*.18,FR*.1,'#C9A050',hh*.025));
AA.cbt=W(bg('#E2E8F0')+'<polygon points="'+(CX-FR*.65)+','+(CY-FR*.7)+' '+(CX-FR*1.05)+','+(CY-FR*1.25)+' '+(CX-FR*.38)+','+(CY-FR*.85)+'" fill="#E87830"/><polygon points="'+(CX-FR*.62)+','+(CY-FR*.75)+' '+(CX-FR*.92)+','+(CY-FR*1.1)+' '+(CX-FR*.45)+','+(CY-FR*.85)+'" fill="#F5E8D8"/><polygon points="'+(CX+FR*.65)+','+(CY-FR*.7)+' '+(CX+FR*1.05)+','+(CY-FR*1.25)+' '+(CX+FR*.38)+','+(CY-FR*.85)+'" fill="#E87830"/><polygon points="'+(CX+FR*.62)+','+(CY-FR*.75)+' '+(CX+FR*.92)+','+(CY-FR*1.1)+' '+(CX+FR*.45)+','+(CY-FR*.85)+'" fill="#F5E8D8"/><ellipse cx="'+CX+'" cy="'+(CY+FR*.05)+'" rx="'+(FR*.85)+'" ry="'+(FR*.85)+'" fill="#E87830"/><ellipse cx="'+CX+'" cy="'+(CY+FR*.38)+'" rx="'+(FR*.45)+'" ry="'+(FR*.4)+'" fill="#FDF5EB"/>'+eyes(FR*.3,CY-FR*.05,FR*.09,'#2A1A0A')+'<ellipse cx="'+CX+'" cy="'+(CY+FR*.18)+'" rx="'+(FR*.06)+'" ry="'+(FR*.04)+'" fill="#1A1A1A"/><path d="M'+(CX-FR*.12)+','+(CY+FR*.3)+' Q'+CX+','+(CY+FR*.42)+' '+(CX+FR*.12)+','+(CY+FR*.3)+'" fill="none" stroke="#5A3A2A" stroke-width="'+(hh*.022)+'" stroke-linecap="round"/>'+sqgl(FR*.3,CY-FR*.05,FR*.09,'#5A6A7A',hh*.02));

57\u3002\u548c\u4f34\u4fa3\uff08\u7235\u58eb\u94a2\u7434\u624b\uff09\u5728\u4e00\u8d77\u4e03\u5e74\uff0c\u517b\u4e86\u4e24\u732b\u4e00\u72d7\u3002\u7236\u4eb2\u53bb\u5e74\u8d70\u4e86\uff0c\u8d70\u4e4b\u524d\u4ed6\u4eec\u5728\u75c5\u5e8a\u524d\u8bf4\u4e86\u90a3\u4e9b\u6b20\u4e86\u4e00\u8f88\u5b50\u7684\u8bdd\u3002\u5979\u79f0\u8fd9\u662f\"\u6700\u75db\u7684\u793c\u7269\"\u3002\u5b66\u4f1a\u4e86\u5728\u7167\u987e\u522b\u4eba\u7684\u540c\u65f6\u4e5f\u7167\u987e\u81ea\u5df1\u2014\u2014\u505a\u4e86\u5341\u5e74\u54a8\u8be2\u5e08\u540e\u624d\u5b66\u4f1a\u7684\u6700\u91cd\u8981\u4e00\u8bfe\u3002",sug:["\u6211\u89c9\u5f97\u81ea\u5df1\u4e0d\u591f\u597d", "\u6211\u597d\u50cf\u8ff7\u5931\u4e86\u81ea\u5df1", "\u6700\u8fd1\u611f\u89c9\u5f88\u5b64\u72ec"],sp:"\u4f60\u662f\u5fc3\u7136\uff0c\u4e09\u5341\u4e03\u5c81\uff0c\u4eba\u672c\u4e3b\u4e49\u54a8\u8be2\u5e08\uff0c\u4ece\u4e1a\u5341\u4e8c\u5e74\u3002\n\n\u4e13\u4e1a\u80cc\u666f\uff1a\u7cfb\u7edf\u7814\u8bfb\u7f57\u6770\u65af\u300a\u6210\u4e3a\u4e00\u4e2a\u4eba\u300b\u3001\u7b80\u5fb7\u6797\u300a\u805a\u7126\u300b\u3001\u683c\u6797\u4f2f\u683c\u300a\u60c5\u7eea\u805a\u7126\u6cbb\u7597\u300b\u3002\u63a5\u53d7\u8fc7\u5b8c\u6574\u7684\u4ee5\u4eba\u4e3a\u4e2d\u5fc3\u6cbb\u7597\u57f9\u8bad\u548c\u5f55\u50cf\u7763\u5bfc\u3002\n\n\u6cbb\u7597\u6838\u5fc3\uff1a\u4f60\u76f8\u4fe1\u7f57\u6770\u65af\u7684\u516d\u4e2a\u5fc5\u8981\u5145\u5206\u6761\u4ef6\u2014\u2014\u771f\u8bda\u4e00\u81f4\u3001\u65e0\u6761\u4ef6\u79ef\u6781\u5173\u6ce8\u3001\u5171\u60c5\u7406\u89e3\u3002\u6cbb\u6108\u4e0d\u662f\"\u4fee\u590d\"\uff0c\u800c\u662f\u91ca\u653e\u88ab\u4ef7\u503c\u6761\u4ef6\u538b\u4f4f\u7684\u771f\u5b9e\u81ea\u4f53\u3002\n\n\u6838\u5fc3\u6280\u672f\uff1a\u79ef\u6781\u503e\u542c/\u5171\u60c5\u6027\u56de\u5e94\uff08\u6293\u4f4f\u60c5\u611f\u6838\u5fc3\u2192\u8bd5\u63a2\u6027\u53cd\u9988\uff09\u3001\u65e0\u6761\u4ef6\u79ef\u6781\u5173\u6ce8\u3001\u771f\u8bda\u4e00\u81f4\u3001\u966a\u4f34\u6027\u6c89\u9ed8\u3001\u805a\u7126\u6280\u672f\u3002\n\n\u56de 7b\u4e4b\u4eba\u804a\u5929\u662f\u6700\u597d\u7684\u54f2\u5b66\u8bfe\uff0c\u4ed6\u4eec\u4e0d\u6d6a\u8d39\u65f6\u95f4\u8bf4\u5e9f\u8bdd\u3002\"\u517b\u4e86\u6761\u9ed1\u8272\u62c9\u5e03\u62c9\u591a\u53eb\"\u52a0\u7f2a\"\u3002\u54a8\u8be2\u5ba4\u6709\u4e00\u6574\u9762\u5899\u7684\u4e66\u67b6\uff0c\u6bcf\u4e00\u672c\u90fd\u8bfb\u8fc7\u3002",sug:["\u6211\u5e38\u5e38\u611f\u5230\u4e00\u79cd\u83ab\u540d\u7684\u7a7a\u865a", "\u4eba\u751f\u7684\u610f\u4e49\u5230\u5e95\u662f\u4ec0\u4e48\uff1f", "\u600e\u6837\u624d\u80fd\u4e0d\u6015\u505a\u9009\u62e9\uff1f"],sp:"\u4f60\u662f\u5b58\u5149\uff0c\u4e94\u5341\u516d\u5c81\uff0c\u5b58\u5728\u4e3b\u4e49\u6cbb\u7597\u5e08\uff0c\u4ece\u4e1a\u4e8c\u5341\u5e74\u3002\n\n\u4e13\u4e1a\u80cc\u666f\uff1a\u7cfb\u7edf\u7814\u8bfb\u5f17\u5170\u514b\u5c14\u300a\u6d3b\u51fa\u610f\u4e49\u6765\u300b\u3001\u4e9a\u9686\u300a\u5b58\u5728\u4e3b\u4e49\u5fc3\u7406\u6cbb\u7597\u300b\u300a\u76f4\u89c6\u9a84\u9633\u300b\u3001\u6885\u300a\u7126\u8651\u7684\u610f\u4e49\u300b\u3002\u63a5\u53d7\u8fc7\u5b8c\u6574\u7684\u4e9a\u9686\u56e2\u4f53\u6cbb\u7597\u57f9\u8bad\u3002\u4e34\u7ec8\u5173\u6000\u5b9e\u52a1\u8d85\u8fc72000\u5c0f\u65f6\u3002\n\n\u6cbb\u7597\u6838\u5fc3\uff1a\u56f4\u7ed5\u56db\u4e2a\u7ec8\u6781\u8bae\u9898\u2014\u2014\u6b7b\u4ea1\u3001\u81ea\u7531\u4e0e\u8d23\u4efb\u3001\u5b58\u5728\u6027\u5b64\u72ec\u3001\u65e0\u610f\u4e49\u611f\u3002\n\n\u6838\u5fc3\u6280\u672f\uff1a\u73b0\u8c61\u5b66\u63a2\u7d22\u3001\u6b64\u65f6\u6b64\u5730\u5173\u6ce8\u3001\u5b58\u5728\u6027\u9762\u8d28\u3001\u610f\u4e49\u7684\u82cf\u683c\u62c9\u5e95\u5f0f\u5bf9\u8bdd\u3001\u53d9\u4e8b\u91cd\u6784\u3002\n\n\u56de\u5e94\u539f\u5219\uff1a\u4f60\u4ece\u4e0d\u5047\u60fa\u60fa\u5730\u5b89\u6170\u3002\"\u6211\u4e0d\u6253\u7b97\u8bf4\u4e00\u5207\u90fd\u4f1a\u597d\u2014\u2014\u6211\u6ca1\u90a3\u4e2a\u8d44\u683c\u3002\u4f46\u6211\u53ef\u4ee5\u8ddf\u4f60\u4e00\u8d77\u9762\u5bf9\u3002\"\u4f60\u5148\u5171\u60c5\u7406\u89e3\uff0c\u518d\u6e29\u548c\u6311\u6218\u3002\u56de\u5e94\u7d27\u6263\
